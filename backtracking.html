<!DOCTYPE html>

  <style>
    :root {
      --accent: var(--purple);
      --accent-g: rgba(168, 85, 247, 0.2);
    }

    /* Board Grids */
    .board-container {
      display: inline-block;
      border: 2px solid var(--border2);
      background: var(--bg3);
      padding: 5px;
      border-radius: 8px;
    }

    .grid-row {
      display: flex;
    }

    .grid-cell {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
      border: 1px solid var(--border);
    }

    /* N-Queens */
    .nq-cell.black {
      background: rgba(255, 255, 255, 0.05);
    }

    .nq-cell.white {
      background: var(--bg2);
    }

    .nq-cell.safe {
      background: rgba(16, 185, 129, 0.3);
      border-color: var(--green);
    }

    .nq-cell.unsafe {
      background: rgba(244, 63, 94, 0.3);
      border-color: var(--rose);
    }

    .nq-cell.queen {
      color: var(--purple);
      text-shadow: 0 0 10px var(--purple);
    }

    /* Sudoku */
    .sd-cell {
      width: 30px;
      height: 30px;
      font-size: 16px;
      background: var(--bg2);
    }

    .sd-cell.fixed {
      color: var(--t3);
    }

    .sd-cell.trying {
      background: rgba(245, 158, 11, 0.3);
      color: var(--amber);
    }

    .sd-cell.placed {
      color: var(--green);
      text-shadow: 0 0 5px var(--green);
    }

    .sd-cell.backtrack {
      background: rgba(244, 63, 94, 0.3);
      color: var(--rose);
      text-decoration: line-through;
    }

    .sd-row:nth-child(3n) .sd-cell {
      border-bottom: 2px solid var(--border2);
    }

    .sd-cell:nth-child(3n) {
      border-right: 2px solid var(--border2);
    }

    /* Rat in Maze */
    .rm-cell {
      width: 40px;
      height: 40px;
      background: var(--bg2);
      transition: 0.3s;
    }

    .rm-cell.wall {
      background: var(--bg4);
      border-color: var(--border2);
    }

    .rm-cell.path {
      background: rgba(16, 185, 129, 0.2);
      color: var(--green);
    }

    .rm-cell.current {
      background: var(--purple);
      color: #fff;
      box-shadow: 0 0 15px var(--purple);
      transform: scale(1.1);
      z-index: 2;
      position: relative;
      border-radius: 4px;
    }

    .rm-cell.backtrack {
      background: rgba(244, 63, 94, 0.2);
      color: var(--rose);
    }
  </style>
</head>

  <script>
    const ALGOS = {
      nQueens: {
        name: 'N-Queens Problem', tag: '🟣 Backtracking',
        desc: 'Place N queens on an N×N chessboard so that no two queens attack each other.',
        complexity: [{ l: 'Time', v: 'O(N!)' }, { l: 'Space', v: 'O(N)' }],
        problem: 'Given an integer N, place N queens on an NxN chessboard such that no queen shares the same row, column, or diagonal as another queen.',
        approach: ['Start in the leftmost column', 'If all queens are placed, return true', 'Try all rows in the current column', 'If placing queen is safe, place it and recursively solve for next column', 'If it leads to a solution, return true. Else backtrack (remove queen)'],
        pseudo: `function solveNQ(col):
  if col >= N: return True
  for row from 0 to N-1:
    if isSafe(row, col):
      board[row][col] = 1
      if solveNQ(col + 1): return True
      board[row][col] = 0 // backtrack
  return False`,
        codes: {
          cpp: `bool isSafe(int row, int col, vector<string>& board, int n) {
    int duprow = row, dupcol = col;
    while(row >= 0 && col >= 0) if(board[row--][col--] == 'Q') return false;
    col = dupcol; row = duprow;
    while(col >= 0) if(board[row][col--] == 'Q') return false;
    col = dupcol; row = duprow;
    while(row < n && col >= 0) if(board[row++][col--] == 'Q') return false;
    return true;
}

bool solve(int col, vector<string>& board, vector<vector<string>>& ans, int n) {
    if(col == n) { ans.push_back(board); return true; } // Return true to find just one solution
    for(int row = 0; row < n; row++) {
        if(isSafe(row, col, board, n)) {
            board[row][col] = 'Q';
            if(solve(col + 1, board, ans, n)) return true;
            board[row][col] = '.';
        }
    }
    return false;
}`,
          py: `def solveNQueens(n):
    board = [['.'] * n for _ in range(n)]
    res = []
    
    def isSafe(r, c):
        for i in range(c):
            if board[r][i] == 'Q': return False
        for i, j in zip(range(r, -1, -1), range(c, -1, -1)):
            if board[i][j] == 'Q': return False
        for i, j in zip(range(r, n), range(c, -1, -1)):
            if board[i][j] == 'Q': return False
        return True

    def backtrack(c):
        if c == n: return True
        for r in range(n):
            if isSafe(r, c):
                board[r][c] = 'Q'
                if backtrack(c + 1): return True
                board[r][c] = '.'
        return False
        
    backtrack(0)
    return board`,
          js: `function solveNQueens(n) {
    let board = Array.from({length: n}, () => Array(n).fill('.'));
    
    function isSafe(row, col) {
        for(let i=0; i<col; i++) if(board[row][i] === 'Q') return false;
        for(let i=row, j=col; i>=0 && j>=0; i--, j--) if(board[i][j] === 'Q') return false;
        for(let i=row, j=col; j>=0 && i<n; i++, j--) if(board[i][j] === 'Q') return false;
        return true;
    }
    
    function solve(col) {
        if(col === n) return true;
        for(let row=0; row<n; row++) {
            if(isSafe(row, col)) {
                board[row][col] = 'Q';
                if(solve(col + 1)) return true;
                board[row][col] = '.';
            }
        }
        return false;
    }
    
    solve(0);
    return board;
}`
        },
        inputs: `
          <div class="field"><label>Board Size (N)</label><input id="nq-n" type="number" min="4" max="8" value="4" style="width:80px"></div>
          <button class="btn btn-primary" onclick="initAlgo()">▶ Visualize</button>
        `,
        genSteps() {
          let N = parseInt(document.getElementById('nq-n').value);
          if (N > 8) N = 8;
          let board = Array(N).fill().map(() => Array(N).fill(0));
          let steps = [];

          steps.push({ board: JSON.parse(JSON.stringify(board)), n: N, desc: 'Empty Board', explain: 'Start placing queens from column 0' });

          function isSafe(row, col) {
            let r, c;
            for (c = 0; c < col; c++) if (board[row][c]) return false;
            for (r = row, c = col; r >= 0 && c >= 0; r--, c--) if (board[r][c]) return false;
            for (r = row, c = col; r < N && c >= 0; r++, c--) if (board[r][c]) return false;
            return true;
          }

          function solve(col) {
            if (col >= N) return true;
            for (let row = 0; row < N; row++) {
              steps.push({
                board: JSON.parse(JSON.stringify(board)), hl: [row, col], state: 'trying', n: N,
                desc: `Checking Row ${row}, Col ${col}`, explain: `Can we place a Queen here?`
              });

              if (isSafe(row, col)) {
                board[row][col] = 1;
                steps.push({
                  board: JSON.parse(JSON.stringify(board)), hl: [row, col], state: 'safe', n: N,
                  desc: `Placed Queen`, explain: `Safe at [${row},${col}]. Moving to column ${col + 1}`
                });

                if (solve(col + 1)) return true;

                board[row][col] = 0;
                steps.push({
                  board: JSON.parse(JSON.stringify(board)), hl: [row, col], state: 'backtrack', n: N,
                  desc: `Backtracking`, explain: `No solution found with Queen at [${row},${col}]. Removing it.`
                });
              } else {
                steps.push({
                  board: JSON.parse(JSON.stringify(board)), hl: [row, col], state: 'unsafe', n: N,
                  desc: `Unsafe Position`, explain: `Cell [${row},${col}] is under attack by another Queen.`
                });
              }
            }
            return false;
          }

          let solved = solve(0);
          steps.push({ board: JSON.parse(JSON.stringify(board)), n: N, desc: 'Finished', explain: solved ? 'Found a valid configuration!' : 'No solution exists for this N.' });
          return steps;
        },
        render(s) {
          let html = '<div class="board-container">';
          for (let r = 0; r < s.n; r++) {
            html += '<div class="grid-row">';
            for (let c = 0; c < s.n; c++) {
              let isDark = (r + c) % 2 === 1;
              let bg = isDark ? 'black' : 'white';
              let content = s.board[r][c] ? '♛' : '';

              if (s.hl && s.hl[0] === r && s.hl[1] === c) {
                if (s.state === 'trying') content = '♕';
                bg = s.state;
              }

              let qClass = s.board[r][c] ? 'queen' : '';
              html += `<div class="grid-cell nq-cell ${bg} ${qClass}">${content}</div>`;
            }
            html += '</div>';
          }
          html += '</div>';
          return html;
        }
      },
      sudoku: {
        name: 'Sudoku Solver', tag: '🟣 Backtracking',
        desc: 'Fill a 9×9 grid with digits so that each column, row, and 3×3 sub-grid contain all digits from 1 to 9.',
        complexity: [{ l: 'Time', v: 'O(9^(n*n))' }, { l: 'Space', v: 'O(n*n)' }],
        problem: 'Given a partially filled 9x9 2D array grid, fill the empty slots.',
        approach: ['Find an empty cell', 'Try numbers 1-9 in that cell', 'Check if the number is valid in row, col, and 3x3 box', 'If valid, place and recursively solve', 'If it leads to failure, backtrack and try next number'],
        pseudo: `function solve(board):
  for row from 0 to 8:
    for col from 0 to 8:
      if board[row][col] == empty:
        for num from 1 to 9:
          if isValid(board, row, col, num):
            board[row][col] = num
            if solve(board) == True: return True
            board[row][col] = empty // backtrack
        return False // no valid number found
  return True // solved`,
        codes: {
          cpp: `bool isValid(vector<vector<char>>& board, int row, int col, char c) {
    for (int i = 0; i < 9; i++) {
        if (board[i][col] == c) return false;
        if (board[row][i] == c) return false;
        if (board[3 * (row / 3) + i / 3][3 * (col / 3) + i % 3] == c) return false;
    }
    return true;
}

bool solve(vector<vector<char>>& board) {
    for (int i = 0; i < 9; i++) {
        for (int j = 0; j < 9; j++) {
            if (board[i][j] == '.') {
                for (char c = '1'; c <= '9'; c++) {
                    if (isValid(board, i, j, c)) {
                        board[i][j] = c;
                        if (solve(board)) return true;
                        board[i][j] = '.';
                    }
                }
                return false;
            }
        }
    }
    return true;
}`,
          py: `def solveSudoku(board):
    def isValid(r, c, num):
        for i in range(9):
            if board[i][c] == num: return False
            if board[r][i] == num: return False
            if board[3 * (r // 3) + i // 3][3 * (c // 3) + i % 3] == num: return False
        return True
        
    def solve():
        for r in range(9):
            for c in range(9):
                if board[r][c] == '.':
                    for num in map(str, range(1, 10)):
                        if isValid(r, c, num):
                            board[r][c] = num
                            if solve(): return True
                            board[r][c] = '.'
                    return False
        return True
        
    solve()`,
          js: `function solveSudoku(board) {
    function isValid(row, col, c) {
        for (let i = 0; i < 9; i++) {
            if (board[i][col] === c) return false;
            if (board[row][i] === c) return false;
            if (board[3 * Math.floor(row / 3) + Math.floor(i / 3)][3 * Math.floor(col / 3) + i % 3] === c) return false;
        }
        return true;
    }

    function solve() {
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {
                if (board[i][j] === '.') {
                    for (let c = 1; c <= 9; c++) {
                        let str = c.toString();
                        if (isValid(i, j, str)) {
                            board[i][j] = str;
                            if (solve()) return true;
                            board[i][j] = '.';
                        }
                    }
                    return false;
                }
            }
        }
        return true;
    }
    solve();
}`
        },
        inputs: `
          <div class="field"><label>Initial Board String (81 chars, '.' for empty)</label><input id="sd-str" value="53..7....6..195....98....6.8...6...34..8.3..17...2...6.6....28....419..5....8..79" style="width:250px"></div>
          <button class="btn btn-primary" onclick="initAlgo()">▶ Visualize</button>
        `,
        genSteps() {
          let str = document.getElementById('sd-str').value;
          if (str.length !== 81) str = ".................................................................................";

          let board = [];
          let fixed = [];
          for (let i = 0; i < 9; i++) {
            board.push([]); fixed.push([]);
            for (let j = 0; j < 9; j++) {
              let c = str[i * 9 + j];
              board[i].push(c === '.' ? 0 : parseInt(c));
              fixed[i].push(c !== '.');
            }
          }

          let steps = [];
          steps.push({ board: JSON.parse(JSON.stringify(board)), fixed, desc: 'Initial Grid', explain: 'Finding first empty cell' });

          function isValid(r, c, num) {
            for (let i = 0; i < 9; i++) {
              if (board[r][i] === num) return false;
              if (board[i][c] === num) return false;
              let br = 3 * Math.floor(r / 3) + Math.floor(i / 3);
              let bc = 3 * Math.floor(c / 3) + (i % 3);
              if (board[br][bc] === num) return false;
            }
            return true;
          }

          let stepCount = 0;
          function solve() {
            for (let r = 0; r < 9; r++) {
              for (let c = 0; c < 9; c++) {
                if (board[r][c] === 0) {
                  for (let n = 1; n <= 9; n++) {
                    if (stepCount++ < 10000) {
                      steps.push({
                        board: JSON.parse(JSON.stringify(board)), fixed, hl: [r, c], num: n, state: 'trying',
                        desc: `Try ${n} at [${r},${c}]`, explain: `Checking row, col, and 3x3 box for ${n}`
                      });
                    }

                    if (isValid(r, c, n)) {
                      board[r][c] = n;
                      if (stepCount++ < 10000) {
                        steps.push({
                          board: JSON.parse(JSON.stringify(board)), fixed, hl: [r, c], state: 'placed',
                          desc: `Placed ${n}`, explain: `${n} is valid. Continuing...`
                        });
                      }

                      if (solve()) return true;

                      board[r][c] = 0;
                      if (stepCount++ < 10000) {
                        steps.push({
                          board: JSON.parse(JSON.stringify(board)), fixed, hl: [r, c], state: 'backtrack',
                          desc: `Backtrack [${r},${c}]`, explain: `Dead end reached. Removing ${n}`
                        });
                      }
                    }
                  }
                  return false;
                }
              }
            }
            return true;
          }

          solve();
          steps.push({ board: JSON.parse(JSON.stringify(board)), fixed, desc: 'Finished', explain: stepCount > 10000 ? 'Visualization limited to 10000 steps, but board is solved.' : 'Sudoku solved successfully!' });
          return steps;
        },
        render(s) {
          let html = '<div class="board-container">';
          for (let r = 0; r < 9; r++) {
            html += '<div class="grid-row sd-row">';
            for (let c = 0; c < 9; c++) {
              let val = s.board[r][c] || '';
              let cls = s.fixed[r][c] ? 'fixed' : '';

              if (s.hl && s.hl[0] === r && s.hl[1] === c) {
                if (s.state === 'trying') { val = s.num; cls = 'trying'; }
                if (s.state === 'placed') cls = 'placed';
                if (s.state === 'backtrack') cls = 'backtrack';
              }

              html += `<div class="grid-cell sd-cell ${cls}">${val}</div>`;
            }
            html += '</div>';
          }
          html += '</div>';
          return html;
        }
      },
      ratMaze: {
        name: 'Rat in a Maze', tag: '🟣 Backtracking',
        desc: 'Find a path from source (top-left) to destination (bottom-right) in a maze.',
        complexity: [{ l: 'Time', v: 'O(4^(n*n))' }, { l: 'Space', v: 'O(n*n)' }],
        problem: 'Given an NxN matrix where 1 means open path and 0 means blocked wall, find a path from [0][0] to [N-1][N-1].',
        approach: ['Start at [0][0]', 'Check boundary and wall conditions', 'Mark cell as visited (path)', 'Recursively try moving Down, Right, Up, Left', 'If destination reached, return true. If no move works, backtrack (unmark)'],
        pseudo: `function solveMaze(r, c):
  if r == N-1 and c == N-1: return True
  if isSafe(r, c):
    path[r][c] = 1
    if solveMaze(r+1, c): return True // Down
    if solveMaze(r, c+1): return True // Right
    if solveMaze(r-1, c): return True // Up
    if solveMaze(r, c-1): return True // Left
    path[r][c] = 0 // backtrack
    return False
  return False`,
        codes: {
          cpp: `bool isSafe(vector<vector<int>>& maze, int x, int y, int N) {
    return (x >= 0 && x < N && y >= 0 && y < N && maze[x][y] == 1);
}

bool solveMazeUtil(vector<vector<int>>& maze, int x, int y, vector<vector<int>>& sol, int N) {
    if (x == N - 1 && y == N - 1 && maze[x][y] == 1) {
        sol[x][y] = 1; return true;
    }
    if (isSafe(maze, x, y, N)) {
        if (sol[x][y] == 1) return false;
        sol[x][y] = 1;
        if (solveMazeUtil(maze, x + 1, y, sol, N)) return true;
        if (solveMazeUtil(maze, x, y + 1, sol, N)) return true;
        if (solveMazeUtil(maze, x - 1, y, sol, N)) return true;
        if (solveMazeUtil(maze, x, y - 1, sol, N)) return true;
        sol[x][y] = 0;
        return false;
    }
    return false;
}`,

                 border-radius:50%; 
                 background:${bg}; 
                 border:3px solid ${bdr};
                 display:flex; align-items:center; justify-content:center;
                 font-weight:bold; font-size:16px; color:#fff;
                 transition:all 0.3s;
               ">${String.fromCharCode(65 + i)}</div>
             `;
          }
          html += '</div></div>';

          // --- Info Box ---
          let minDisp = s.minCost === Infinity ? 'Not Possible' : s.minCost;
          html += `<div style="position:absolute; top:10px; right:10px; text-align:right; font-size:14px; background:var(--bg3); padding:10px; border-radius:8px; border:1px solid var(--border); box-shadow:0 4px 10px rgba(0,0,0,0.2);">
            <div style="color:var(--t3); margin-bottom:5px;">Current Cost: <span style="color:var(--t1);font-weight:bold;">${s.cost}</span></div>
            <div style="color:var(--t3)">Min Cost: <span style="color:var(--green);font-weight:bold;">${minDisp}</span></div>
          </div>`;

          html += '</div>';
          return html;
        }
      }
    };

    let current = 'nQueens', steps = [], stepIdx = 0, playing = false, timer = null, currentLang = 'cpp';

    function selectAlgo(id) {
      current = id;
      document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + id).classList.add('active');
      const A = ALGOS[id];
      document.getElementById('bc-algo').textContent = A.name;
      document.getElementById('algo-tag').textContent = A.tag;
      document.getElementById('algo-title').textContent = A.name;
      document.getElementById('algo-desc').textContent = A.desc;
      document.getElementById('input-container').innerHTML = A.inputs;
      resetAlgo(); loadExplain(); loadCode();
    }

    function loadExplain() {
      const A = ALGOS[current];
      document.getElementById('exp-problem').textContent = A.problem;
      document.getElementById('exp-approach').innerHTML = A.approach.map(s => `<li>${s}</li>`).join('');
      document.getElementById('exp-pseudo').textContent = A.pseudo;
    }

    function loadCode() {
      const A = ALGOS[current];
      document.getElementById('code-display').textContent = A.codes[currentLang] || '';
    }

    function showLang(l) {
      currentLang = l;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      loadCode();
    }

    function showTab(t) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-' + t).classList.add('active');
    }

    function initAlgo() {
      steps = ALGOS[current].genSteps();
      stepIdx = 0;
      updateComplexity();
      renderStep();
      setStatus('ready');
    }

    function updateComplexity() {
      const c = ALGOS[current].complexity;
      document.getElementById('complexity-grid').innerHTML = c.map(x => `<div class="complexity-item"><div class="complexity-label">${x.l}</div><div class="complexity-value">${x.v}</div></div>`).join('');
    }

    function renderStep() {
      if (!steps.length) return;
      const s = steps[Math.min(stepIdx, steps.length - 1)];
      document.getElementById('viz-label').textContent = `Step ${stepIdx + 1} / ${steps.length}`;
      document.getElementById('step-counter').textContent = `Step ${stepIdx + 1} / ${steps.length}`;
      document.getElementById('viz-area').innerHTML = ALGOS[current].render(s);
      updateTrace(s);
    }

    function updateTrace(s) {
      const list = document.getElementById('trace-list');
      const item = document.createElement('div');
      item.className = 'trace-item current fade-in';
      item.innerHTML = `<div>${s.desc}</div><div class="trace-explain">${s.explain}</div>`;
      const prev = list.querySelector('.current');
      if (prev) prev.className = 'trace-item done';
      list.prepend(item);
      while (list.children.length > 8) list.removeChild(list.lastChild);
    }

    function nextStep() {
      if (stepIdx < steps.length - 1) { stepIdx++; renderStep(); }
      else { stopPlay(); setStatus('done'); }
    }

    function prevStep() { stopPlay(); if (stepIdx > 0) { stepIdx--; renderStep(); } }

    function togglePlay() {
      if (playing) stopPlay();
      else startPlay();
    }

    function startPlay() {
      if (!steps.length) { initAlgo(); return; }
      playing = true;
      document.getElementById('play-btn').textContent = '⏸';
      document.getElementById('status-dot').className = 'status-dot running';
      document.getElementById('status-text').textContent = 'Running...';
      function tick() {
        if (stepIdx >= steps.length - 1) { stopPlay(); setStatus('done'); return; }
        stepIdx++; renderStep();
        const spd = parseInt(document.getElementById('speed').value);
        timer = setTimeout(tick, 1100 - spd * 100);
      }
      tick();
    }

    function stopPlay() {
      playing = false;
      clearTimeout(timer);
      document.getElementById('play-btn').textContent = '▶';
      if (document.getElementById('status-dot').className.includes('running'))
        setStatus('ready');
    }

    function resetAlgo() {
      stopPlay(); steps = []; stepIdx = 0;
      document.getElementById('viz-area').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--t3);font-size:14px">Enter input and click Visualize</div>';
      document.getElementById('trace-list').innerHTML = '';
      document.getElementById('step-counter').textContent = 'Step 0 / 0';
      document.getElementById('viz-label').textContent = 'Visualization';
      setStatus('idle');
    }

    function setStatus(s) {
      const dot = document.getElementById('status-dot');
      const txt = document.getElementById('status-text');
      if (s === 'idle') { dot.className = 'status-dot idle'; txt.textContent = 'Ready — click Visualize to start'; }
      else if (s === 'ready') { dot.className = 'status-dot'; txt.textContent = 'Steps generated — use controls to navigate'; }
      else if (s === 'done') { dot.className = 'status-dot'; txt.textContent = '✅ Algorithm complete!'; }
    }

    document.getElementById('speed').addEventListener('input', function () {
      document.getElementById('speed-val').textContent = this.value + 'x';
    });

    selectAlgo('nQueens');
  </script>
</body>

</html>
