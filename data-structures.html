<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Data Structures | ALGO Visualizer</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --accent: var(--blue);
      --accent-g: rgba(59, 130, 246, 0.2);
    }
    
    /* Stack Styles */
    .ds-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      min-height: 250px;
      padding: 20px;
    }
    .stack-wrap {
      width: 120px;
      border: 3px solid var(--border2);
      border-top: none;
      border-radius: 0 0 10px 10px;
      background: var(--bg3);
      display: flex;
      flex-direction: column-reverse; /* Bottom to top */
      padding: 5px;
      gap: 5px;
      min-height: 200px;
    }
    .ds-item {
      background: var(--accent-g);
      border: 2px solid var(--accent);
      color: var(--blue);
      text-align: center;
      padding: 10px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 18px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: popIn 0.3s ease-out forwards;
    }
    .ds-item.removed {
      background: rgba(244, 63, 94, 0.2);
      border-color: var(--rose);
      color: var(--rose);
      transform: translateY(-20px);
      opacity: 0.5;
    }
    .ds-item.highlight {
      background: rgba(16, 185, 129, 0.2);
      border-color: var(--green);
      color: var(--green);
      transform: scale(1.05);
    }
    
    /* Queue Styles */
    .queue-wrap {
      display: flex;
      border-top: 3px solid var(--border2);
      border-bottom: 3px solid var(--border2);
      background: var(--bg3);
      padding: 5px 20px;
      gap: 10px;
      min-width: 300px;
      height: 80px;
      align-items: center;
      overflow-x: auto;
    }
    
    /* Heap Styles */
    .tree-node {
      display: inline-block;
      width: 40px;
      height: 40px;
      line-height: 40px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      background: var(--bg3);
      color: var(--t1);
      margin: 2px;
      font-weight: bold;
    }
    .tree-node.highlight { background: var(--accent-g); color: var(--accent); transform: scale(1.1); box-shadow: 0 0 10px var(--accent); }
    .tree-node.swapping { background: rgba(245, 158, 11, 0.2); border-color: var(--amber); color: var(--amber); }
    
    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

  <script>
    const ALGOS = {
      stack: {
        name: 'Stack (LIFO)', tag: '🔵 Data Structures',
        desc: 'A linear data structure that follows the Last In First Out (LIFO) principle.',
        complexity: [{ l: 'Push', v: 'O(1)' }, { l: 'Pop', v: 'O(1)' }, { l: 'Peek', v: 'O(1)' }],
        problem: 'Stacks represent a collection of items where the addition of new items and the removal of existing items always takes place at the same end, called the "top".',
        approach: ['Push: Add an element to the top of the stack', 'Pop: Remove the top element from the stack', 'Peek/Top: Look at the top element without removing it'],
        pseudo: `class Stack:
  def push(item):
    arr.append(item)
    top += 1

  def pop():
    if isEmpty(): return ERROR
    item = arr[top]
    top -= 1
    return item`,
        codes: {
          cpp: `class Stack {
    int top;
    int arr[1000];
public:
    Stack() { top = -1; }
    void push(int x) { arr[++top] = x; }
    int pop() {
        if (top < 0) return -1;
        return arr[top--];
    }
    int peek() {
        if (top < 0) return -1;
        return arr[top];
    }
    bool isEmpty() { return top < 0; }
};`,
          py: `class Stack:
    def __init__(self):
        self.stack = []
        
    def push(self, x):
        self.stack.append(x)
        
    def pop(self):
        if not self.is_empty():
            return self.stack.pop()
        return -1
        
    def peek(self):
        if not self.is_empty():
            return self.stack[-1]
        return -1
        
    def is_empty(self):
        return len(self.stack) == 0`,
          js: `class Stack {
    constructor() {
        this.items = [];
    }
    push(element) {
        this.items.push(element);
    }
    pop() {
        if (this.items.length == 0) return "Underflow";
        return this.items.pop();
    }
    peek() {
        return this.items[this.items.length - 1];
    }
    isEmpty() {
        return this.items.length == 0;
    }
}`
        },
        inputs: `
          <div class="field"><label>Format: Push [val] | Pop | Peek</label><input id="ds-ops" value="Push 10, Push 20, Push 30, Pop, Peek, Push 40, Pop" style="width:350px"></div>
          <button class="btn btn-primary" onclick="initAlgo()">▶ Visualize</button>
        `,
        genSteps() {
          let ops = document.getElementById('ds-ops').value.split(',').map(s => s.trim());
          let stack = [];
          let steps = [];
          
          steps.push({ stack: [...stack], desc: 'Initial Stack', explain: 'Stack is empty.' });

          for (let op of ops) {
            let parts = op.split(' ');
            let cmd = parts[0].toLowerCase();
            let val = parts[1] ? parts[1] : null;

            if (cmd === 'push' && val) {
              stack.push(val);
              steps.push({ stack: [...stack], hl: stack.length - 1, state: 'added', desc: `Push(${val})`, explain: `Added ${val} to the top.` });
            } else if (cmd === 'pop') {
              if (stack.length > 0) {
                let removed = stack.pop();
                steps.push({ stack: [...stack], removedVal: removed, state: 'removed', desc: `Pop() -> ${removed}`, explain: `Removed top element (${removed}).` });
              } else {
                steps.push({ stack: [...stack], desc: `Pop()`, explain: `Stack Underflow! Cannot pop from empty stack.` });
              }
            } else if (cmd === 'peek' || cmd === 'top') {
              if (stack.length > 0) {
                steps.push({ stack: [...stack], hl: stack.length - 1, state: 'highlight', desc: `Peek() -> ${stack[stack.length - 1]}`, explain: `Top element is ${stack[stack.length - 1]}.` });
              } else {
                steps.push({ stack: [...stack], desc: `Peek()`, explain: `Stack is empty.` });
              }
            }
          }
          steps.push({ stack: [...stack], desc: 'Operations Complete', explain: `Final stack size: ${stack.length}` });
          return steps;
        },
        render(s) {
          let html = '<div class="ds-container"><div class="stack-wrap">';
          if (s.stack.length === 0 && !s.removedVal) {
            html += '<div style="color:var(--t3);text-align:center;align-self:center;margin:auto;">Empty</div>';
          }
          
          // Render current stack
          for (let i = 0; i < s.stack.length; i++) {
            let cls = '';
            if (s.hl === i) {
               if(s.state === 'added') cls = 'highlight'; // Green flash
               if(s.state === 'highlight') cls = 'highlight'; 
            }
            html += `<div class="ds-item ${cls}">${s.stack[i]}</div>`;
          }
          
          // Render popping item hovering above
          if (s.state === 'removed' && s.removedVal) {
            html += `<div class="ds-item removed">${s.removedVal}</div>`;
          }
          
          html += '</div></div>';
          return html;
        }
      },
      queue: {
        name: 'Queue (FIFO)', tag: '🔵 Data Structures',
        desc: 'A linear data structure that follows the First In First Out (FIFO) principle.',
        complexity: [{ l: 'Enqueue', v: 'O(1)' }, { l: 'Dequeue', v: 'O(1)' }, { l: 'Front', v: 'O(1)' }],
        problem: 'Queues maintain two ends: a front and a rear. Items are added at the rear and removed from the front.',
        approach: ['Enqueue: Add an element to the rear of the queue', 'Dequeue: Remove an element from the front of the queue', 'Front: Look at the first element'],
        pseudo: `class Queue:
  def enqueue(item):
    arr.append(item)
    rear += 1

  def dequeue():
    if isEmpty(): return ERROR
    item = arr[front]
    front += 1
    return item`,
        codes: {
          cpp: `class Queue {
    int front, rear;
    int arr[1000];
public:
    Queue() { front = 0; rear = 0; }
    void enqueue(int x) { arr[rear++] = x; }
    int dequeue() {
        if (front == rear) return -1;
        return arr[front++];
    }
    bool isEmpty() { return front == rear; }
};`,
          py: `class Queue:
    def __init__(self):
        self.queue = []
        
    def enqueue(self, x):
        self.queue.append(x)
        
    def dequeue(self):
        if not self.is_empty():
            return self.queue.pop(0)
        return -1
        
    def is_empty(self):
        return len(self.queue) == 0`,
          js: `class Queue {
    constructor() {
        this.items = [];
    }
    enqueue(element) {
        this.items.push(element);
    }
    dequeue() {
        if (this.isEmpty()) return "Underflow";
        return this.items.shift();
    }
    isEmpty() {
        return this.items.length === 0;
    }
}`
        },
        inputs: `
          <div class="field"><label>Format: Enq [val] | Deq | Front</label><input id="ds-ops" value="Enq 1, Enq 2, Enq 3, Deq, Front, Enq 4, Deq" style="width:350px"></div>
          <button class="btn btn-primary" onclick="initAlgo()">▶ Visualize</button>
        `,
        genSteps() {
          let ops = document.getElementById('ds-ops').value.split(',').map(s => s.trim());
          let queue = [];
          let steps = [];
          
          steps.push({ queue: [...queue], desc: 'Initial Queue', explain: 'Queue is empty.' });

          for (let op of ops) {
            let parts = op.split(' ');
            let cmd = parts[0].toLowerCase();
            let val = parts[1] ? parts[1] : null;

            if ((cmd === 'enq' || cmd === 'enqueue') && val) {
              queue.push(val);
              steps.push({ queue: [...queue], hl: queue.length - 1, state: 'added', desc: `Enqueue(${val})`, explain: `Added ${val} to the rear.` });
            } else if (cmd === 'deq' || cmd === 'dequeue') {
              if (queue.length > 0) {
                let removed = queue.shift();
                steps.push({ queue: [...queue], removedVal: removed, state: 'removed', desc: `Dequeue() -> ${removed}`, explain: `Removed front element (${removed}).` });
              } else {
                steps.push({ queue: [...queue], desc: `Dequeue()`, explain: `Queue Underflow! Cannot dequeue from empty queue.` });
              }
            } else if (cmd === 'front' || cmd === 'peek') {
              if (queue.length > 0) {
                steps.push({ queue: [...queue], hl: 0, state: 'highlight', desc: `Front() -> ${queue[0]}`, explain: `Front element is ${queue[0]}.` });
              } else {
                steps.push({ queue: [...queue], desc: `Front()`, explain: `Queue is empty.` });
              }
            }
          }
          steps.push({ queue: [...queue], desc: 'Operations Complete', explain: `Final queue size: ${queue.length}` });
          return steps;
        },
        render(s) {
          let html = '<div class="ds-container"><div style="display:flex;align-items:center;">';
          html += '<div style="margin-right:15px;color:var(--t3);font-weight:bold;">FRONT</div>';
          
          html += '<div class="queue-wrap">';
          
          // Dequeued item sliding left
          if (s.state === 'removed' && s.removedVal) {
             html += `<div class="ds-item removed" style="transform:translateX(-20px)">${s.removedVal}</div>`;
          }
          
          if (s.queue.length === 0 && !s.removedVal) {
             html += '<div style="color:var(--t3);text-align:center;width:100%;">Empty</div>';
          }
          
          for (let i = 0; i < s.queue.length; i++) {
            let cls = '';
            if (s.hl === i) {
               if(s.state === 'added') cls = 'highlight'; 
               if(s.state === 'highlight') cls = 'highlight'; 
            }
            html += `<div class="ds-item ${cls}">${s.queue[i]}</div>`;
          }
          
          html += '</div>';
          html += '<div style="margin-left:15px;color:var(--t3);font-weight:bold;">REAR</div>';
          html += '</div></div>';
          return html;
        }
      },
      pq: {
        name: 'Priority Queue (Max Heap)', tag: '🔵 Data Structures',
        desc: 'A queue where elements are retrieved based on their priority (value) rather than insertion order. Implemented using a Max Heap array.',
        complexity: [{ l: 'Insert', v: 'O(log n)' }, { l: 'Extract Max', v: 'O(log n)' }, { l: 'Peek', v: 'O(1)' }],
        problem: 'Maintains a complete binary tree where the parent node is always greater than or equal to its child nodes.',
        approach: ['Insert: Add to end of array, then sift up (compare with parent and swap)', 'Extract Max: Swap root with last element, remove last, then sift down from root'],
        pseudo: `def insert(val):
  heap.append(val)
  sift_up(len(heap) - 1)

def extract_max():
  swap(heap[0], heap[-1])
  max_val = heap.pop()
  sift_down(0)
  return max_val`,
        codes: {
          cpp: `// C++ STL provides priority_queue out of the box
#include <queue>
using namespace std;

priority_queue<int> pq;
pq.push(10);     // Insert O(log n)
int x = pq.top(); // Peek max O(1)
pq.pop();        // Extract max O(log n)`,
          py: `# Python provides heapq (Min Heap). 
# For Max Heap, insert negative values.
import heapq
pq = []
heapq.heappush(pq, -10)        # Insert
max_val = -pq[0]               # Peek max
max_val = -heapq.heappop(pq)   # Extract max`,
          js: `class MaxHeap {
    constructor() { this.heap = []; }
    insert(val) {
        this.heap.push(val);
        this.siftUp(this.heap.length - 1);
    }
    extractMax() {
        if(this.heap.length === 0) return null;
        if(this.heap.length === 1) return this.heap.pop();
        let max = this.heap[0];
        this.heap[0] = this.heap.pop();
        this.siftDown(0);
        return max;
    }
    // siftUp and siftDown implementations omitted for brevity
}`
        },
        inputs: `
          <div class="field"><label>Format: Ins [val] | ExtMax</label><input id="ds-ops" value="Ins 40, Ins 50, Ins 10, Ins 60, ExtMax, Ins 20" style="width:350px"></div>
          <button class="btn btn-primary" onclick="initAlgo()">▶ Visualize</button>
        `,
        genSteps() {
          let ops = document.getElementById('ds-ops').value.split(',').map(s => s.trim());
          let heap = [];
          let steps = [];
          
          steps.push({ heap: [...heap], desc: 'Empty Max Heap', explain: 'Waiting for operations.' });

          for (let op of ops) {
            let parts = op.split(' ');
            let cmd = parts[0].toLowerCase();
            let val = parts[1] ? parseInt(parts[1]) : null;

            if ((cmd === 'ins' || cmd === 'insert') && val !== null) {
              heap.push(val);
              let curr = heap.length - 1;
              steps.push({ heap: [...heap], hl: [curr], desc: `Insert(${val})`, explain: `Added at end of array (index ${curr}). Sifting up...` });
              
              // Sift Up
              while(curr > 0) {
                let parent = Math.floor((curr - 1) / 2);
                steps.push({ heap: [...heap], hl: [curr, parent], desc: `Compare`, explain: `Compare ${heap[curr]} with parent ${heap[parent]}` });
                if(heap[curr] > heap[parent]) {
                  let temp = heap[curr]; heap[curr] = heap[parent]; heap[parent] = temp;
                  steps.push({ heap: [...heap], hl: [curr, parent], state: 'swap', desc: `Swap`, explain: `${heap[parent]} > ${heap[curr]}, so swapped.` });
                  curr = parent;
                } else {
                  steps.push({ heap: [...heap], hl: [curr], state: 'done', desc: `Sift Up Complete`, explain: `${heap[curr]} <= parent ${heap[parent]}, Heap property satisfied.` });
                  break;
                }
              }
              if(curr === 0) steps.push({ heap: [...heap], hl: [0], state: 'done', desc: `New Root`, explain: `${val} reached the root.` });
              
            } else if (cmd === 'extmax' || cmd === 'extract') {
              if (heap.length === 0) {
                steps.push({ heap: [...heap], desc: `Extract Max`, explain: `Heap is empty!` });
              } else if (heap.length === 1) {
                let max = heap.pop();
                steps.push({ heap: [...heap], desc: `Extract Max -> ${max}`, explain: `Removed the only element.` });
              } else {
                let max = heap[0];
                steps.push({ heap: [...heap], hl: [0], desc: `Extract Max`, explain: `Root is ${max}. Swapping with last element ${heap[heap.length-1]}.` });
                
                heap[0] = heap.pop();
                steps.push({ heap: [...heap], hl: [0], state: 'swap', desc: `Swap and Remove`, explain: `New root is ${heap[0]}. Removed ${max}. Sifting down...` });
                
                // Sift Down
                let curr = 0;
                while(true) {
                  let left = 2 * curr + 1;
                  let right = 2 * curr + 2;
                  let largest = curr;
                  
                  if(left < heap.length && heap[left] > heap[largest]) largest = left;
                  if(right < heap.length && heap[right] > heap[largest]) largest = right;
                  
                  if(largest !== curr) {
                    steps.push({ heap: [...heap], hl: [curr, largest], desc: `Compare`, explain: `Child ${heap[largest]} is greater than parent ${heap[curr]}.` });
                    let temp = heap[curr]; heap[curr] = heap[largest]; heap[largest] = temp;
                    steps.push({ heap: [...heap], hl: [curr, largest], state: 'swap', desc: `Swap`, explain: `Swapped down.` });
                    curr = largest;
                  } else {
                    steps.push({ heap: [...heap], hl: [curr], state: 'done', desc: `Sift Down Complete`, explain: `Heap property satisfied.` });
                    break;
                  }
                }
              }
            }
          }
          steps.push({ heap: [...heap], desc: 'Operations Complete', explain: `Final Heap Size: ${heap.length}` });
          return steps;
        },
        render(s) {
          // Render array representation
          let arrHtml = '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px;justify-content:center;">';
          for(let i=0; i<s.heap.length; i++) {
             let cls = '';
             if(s.hl && s.hl.includes(i)) {
                cls = 'highlight';
                if(s.state === 'swap') cls = 'swapping';
             }
             arrHtml += `<div class="ds-item ${cls}" style="padding:5px 10px;font-size:14px;">
               <div style="font-size:10px;color:var(--t3)">[${i}]</div>
               ${s.heap[i]}
             </div>`;
          }
          if(s.heap.length===0) arrHtml += '<div style="color:var(--t3)">Empty Array</div>';
          arrHtml += '</div>';

          // Render tree representation conceptually
          function renderNode(i) {
             if(i >= s.heap.length) return '';
             let cls = '';
             if(s.hl && s.hl.includes(i)) {
                cls = 'highlight';
                if(s.state === 'swap') cls = 'swapping';
             }
             let inner = `<div class="tree-node ${cls}">${s.heap[i]}</div>`;
             
             let left = 2*i + 1;
             let right = 2*i + 2;
             
             if(left < s.heap.length || right < s.heap.length) {
               inner += `<div style="display:flex;gap:15px;justify-content:center;margin-top:5px;position:relative;">
                 <div style="position:absolute;top:-10px;width:50%;height:10px;border-top:1px solid var(--border);border-left:1px solid var(--border);border-right:1px solid var(--border);"></div>
                 <div>${renderNode(left)}</div>
                 <div>${renderNode(right)}</div>
               </div>`;
             }
             return `<div style="text-align:center;">${inner}</div>`;
          }
          
          let treeHtml = s.heap.length > 0 ? `<div style="display:flex;justify-content:center;">${renderNode(0)}</div>` : '';
          
          return `<div>
            <div style="text-align:center;color:var(--t3);font-size:12px;margin-bottom:5px">Array Representation</div>
            ${arrHtml}
            <div style="text-align:center;color:var(--t3);font-size:12px;margin-bottom:5px;margin-top:15px">Tree Representation</div>
            ${treeHtml}
          </div>`;
        }
      }
    };

    let current = 'stack', steps = [], stepIdx = 0, playing = false, timer = null, currentLang = 'cpp';

    function selectAlgo(id) {
      current = id;
      document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + id).classList.add('active');
      const A = ALGOS[id];
      document.getElementById('bc-algo').textContent = A.name;
      document.getElementById('algo-tag').textContent = A.tag;
      document.getElementById('algo-title').textContent = A.name;
      document.getElementById('algo-desc').textContent = A.desc;
      document.getElementById('input-container').innerHTML = A.inputs;
      resetAlgo(); loadExplain(); loadCode();
    }

    function loadExplain() {
      const A = ALGOS[current];
      document.getElementById('exp-problem').textContent = A.problem;
      document.getElementById('exp-approach').innerHTML = A.approach.map(s => `<li>${s}</li>`).join('');
      document.getElementById('exp-pseudo').textContent = A.pseudo;
    }

    function loadCode() {
      const A = ALGOS[current];
      document.getElementById('code-display').textContent = A.codes[currentLang] || '';
    }

    function showLang(l) {
      currentLang = l;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      loadCode();
    }

    function showTab(t) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-' + t).classList.add('active');
    }

    function initAlgo() {
      steps = ALGOS[current].genSteps();
      stepIdx = 0;
      updateComplexity();
      renderStep();
      setStatus('ready');
    }

    function updateComplexity() {
      const c = ALGOS[current].complexity;
      document.getElementById('complexity-grid').innerHTML = c.map(x => `<div class="complexity-item"><div class="complexity-label">${x.l}</div><div class="complexity-value">${x.v}</div></div>`).join('');
    }

    function renderStep() {
      if (!steps.length) return;
      const s = steps[Math.min(stepIdx, steps.length - 1)];
      document.getElementById('viz-label').textContent = `Step ${stepIdx + 1} / ${steps.length}`;
      document.getElementById('step-counter').textContent = `Step ${stepIdx + 1} / ${steps.length}`;
      document.getElementById('viz-area').innerHTML = ALGOS[current].render(s);
      updateTrace(s);
    }

    function updateTrace(s) {
      const list = document.getElementById('trace-list');
      const item = document.createElement('div');
      item.className = 'trace-item current fade-in';
      item.innerHTML = `<div>${s.desc}</div><div class="trace-explain">${s.explain}</div>`;
      const prev = list.querySelector('.current');
      if (prev) prev.className = 'trace-item done';
      list.prepend(item);
      while (list.children.length > 8) list.removeChild(list.lastChild);
    }

    function nextStep() {
      if (stepIdx < steps.length - 1) { stepIdx++; renderStep(); }
      else { stopPlay(); setStatus('done'); }
    }

    function prevStep() { stopPlay(); if (stepIdx > 0) { stepIdx--; renderStep(); } }

    function togglePlay() {
      if (playing) stopPlay();
      else startPlay();
    }

    function startPlay() {
      if (!steps.length) { initAlgo(); return; }
      playing = true;
      document.getElementById('play-btn').textContent = '⏸';
      document.getElementById('status-dot').className = 'status-dot running';
      document.getElementById('status-text').textContent = 'Running...';
      function tick() {
        if (stepIdx >= steps.length - 1) { stopPlay(); setStatus('done'); return; }
        stepIdx++; renderStep();
        const spd = parseInt(document.getElementById('speed').value);
        timer = setTimeout(tick, 1100 - spd * 100);
      }
      tick();
    }

    function stopPlay() {
      playing = false;
      clearTimeout(timer);
      document.getElementById('play-btn').textContent = '▶';
      if (document.getElementById('status-dot').className.includes('running'))
        setStatus('ready');
    }

    function resetAlgo() {
      stopPlay(); steps = []; stepIdx = 0;
      document.getElementById('viz-area').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--t3);font-size:14px">Enter operations and click Visualize</div>';
      document.getElementById('trace-list').innerHTML = '';
      document.getElementById('step-counter').textContent = 'Step 0 / 0';
      document.getElementById('viz-label').textContent = 'Visualization';
      setStatus('idle');
    }

    function setStatus(s) {
      const dot = document.getElementById('status-dot');
      const txt = document.getElementById('status-text');
      if (s === 'idle') { dot.className = 'status-dot idle'; txt.textContent = 'Ready — click Visualize to start'; }
      else if (s === 'ready') { dot.className = 'status-dot'; txt.textContent = 'Steps generated — use controls to navigate'; }
      else if (s === 'done') { dot.className = 'status-dot'; txt.textContent = '✅ Algorithm complete!'; }
    }

    document.getElementById('speed').addEventListener('input', function () {
      document.getElementById('speed-val').textContent = this.value + 'x';
    });

    selectAlgo('stack');
  </script>
</body>
</html>
